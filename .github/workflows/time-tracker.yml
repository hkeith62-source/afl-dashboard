name: Update Time Status

on:
  repository_dispatch:
    types: [clock_in, clock_out]

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update JSON
        run: |
          echo "Updating time-status.json"
          node update-time.js

      - name: Commit changes
        run: |
          git config user.name "Keith Automation"
          git config user.email "keith@example.com"
          git add data/time-status.json
          git commit -m "Updated time status"
          git push
